<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" font-family="-apple-system, Inter, sans-serif">
  <rect width="1400" height="620" fill="#fafafa"/>

  <text x="700" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#1a1a1a">The bill stays. Usage doesn't.</text>
  <text x="700" y="78" text-anchor="middle" font-size="15" fill="#5a5a5a">Internal tools fail by zombiehood, not by death. The AWS line item is the only signal — and it's hidden in real spend.</text>

  <!-- Chart area -->
  <g transform="translate(120, 130)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="380" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="0" y1="380" x2="1160" y2="380" stroke="#1a1a1a" stroke-width="2"/>

    <!-- Y axis labels -->
    <text x="-15" y="10" text-anchor="end" font-size="13" fill="#5a5a5a">$200</text>
    <text x="-15" y="100" text-anchor="end" font-size="13" fill="#5a5a5a">$150</text>
    <text x="-15" y="190" text-anchor="end" font-size="13" fill="#5a5a5a">$100</text>
    <text x="-15" y="280" text-anchor="end" font-size="13" fill="#5a5a5a">$50</text>
    <text x="-15" y="385" text-anchor="end" font-size="13" fill="#5a5a5a">$0</text>

    <!-- Grid lines -->
    <line x1="0" y1="0" x2="1160" y2="0" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="100" x2="1160" y2="100" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="190" x2="1160" y2="190" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="280" x2="1160" y2="280" stroke="#e8e8e8" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- Cost line (flat $122/mo) -->
    <line x1="0" y1="160" x2="900" y2="160" stroke="#c83e3e" stroke-width="3"/>
    <line x1="900" y1="160" x2="900" y2="360" stroke="#c83e3e" stroke-width="3"/>
    <line x1="900" y1="360" x2="1160" y2="360" stroke="#c83e3e" stroke-width="3"/>
    <text x="450" y="148" text-anchor="middle" font-size="13" fill="#c83e3e" font-weight="700">Monthly cost — $122 running</text>
    <text x="1030" y="350" text-anchor="middle" font-size="13" fill="#c83e3e" font-weight="700">$11 idled</text>

    <!-- Usage line (decays from ~80% to ~10%) -->
    <path d="M 0 60 Q 200 80 400 150 T 800 320 L 900 340 L 1160 340"
          fill="none" stroke="#5a5a5a" stroke-width="3" stroke-dasharray="6,4"/>
    <text x="200" y="70" text-anchor="middle" font-size="13" fill="#5a5a5a" font-weight="700">Daily queries (left scale, decaying)</text>

    <!-- Time axis -->
    <text x="0" y="405" text-anchor="middle" font-size="12" fill="#5a5a5a">Day 1</text>
    <text x="290" y="405" text-anchor="middle" font-size="12" fill="#5a5a5a">Week 1</text>
    <text x="580" y="405" text-anchor="middle" font-size="12" fill="#5a5a5a">Week 2</text>
    <text x="900" y="405" text-anchor="middle" font-size="12" fill="#5a5a5a">Week 3 (idle)</text>
    <text x="1100" y="405" text-anchor="middle" font-size="12" fill="#5a5a5a">Week 4</text>

    <!-- Marker: idle decision -->
    <line x1="900" y1="0" x2="900" y2="380" stroke="#1a8917" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="910" y="20" font-size="13" fill="#1a8917" font-weight="700">Idle decision</text>
    <text x="910" y="38" font-size="12" fill="#1a8917">2-of-3 not met</text>
  </g>

  <text x="700" y="555" text-anchor="middle" font-size="14" fill="#1a1a1a" font-style="italic">
    Usage falls 80% in three weeks. The bill doesn't move until you cut it. The gap is where money disappears.
  </text>
  <text x="700" y="585" text-anchor="middle" font-size="13" fill="#5a5a5a">
    Three weeks of running with zero engagement = $90 of nothing.
  </text>
</svg>
