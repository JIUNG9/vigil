name: Feature request
description: Propose a new capability or an improvement to an existing one.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        **Before filing:** please check [existing issues](https://github.com/JIUNG9/vigil/issues?q=is%3Aissue+label%3Aenhancement) — your idea may already be on the roadmap or under discussion.

        For large or architectural changes, please open a [Discussion](https://github.com/JIUNG9/vigil/discussions) first. That lets us shape the proposal together before code gets written.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution. Example "I want to be able to..." or "It's currently hard to..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Vigil to behave? Be as specific as you can — CLI flags, file layout, config keys.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they didn't work.

  - type: dropdown
    id: scope
    attributes:
      label: Which surface does this affect?
      multiple: true
      options:
        - Web dashboard
        - CLI (vigil command)
        - Local sync agent (vigil-sync)
        - RAG / search pipeline
        - Indexer (brain repo ingestion)
        - MCP server
        - Slack integration
        - Documentation only
        - Other (describe in proposal)
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Optional. Mockups, links to similar features in other projects, related discussion threads.
