# =============================================================================
# Publish to PyPI on tag push.
#
# Uses PyPI Trusted Publisher (OIDC) — no API token in repository secrets.
#
# One-time setup on PyPI:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a "pending publisher" with:
#        PyPI Project Name:   vigil-devsecops
#        Owner:               JIUNG9
#        Repository name:     vigil
#        Workflow filename:   publish.yml
#        Environment name:    pypi
#   3. After the first successful run, the publisher becomes "trusted".
#
# Trigger: pushing a tag matching v*.*.* on main.
# =============================================================================
name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-releases: v1.2.3-rc1, v1.2.3-alpha

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib,sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$TAG" != "$PYPROJECT_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Tag and pyproject version agree: $TAG"

      - name: Build sdist + wheel
        run: python -m build

      - name: Inspect built artifacts
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: distribution
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vigil-devsecops
    permissions:
      id-token: write   # required for OIDC / Trusted Publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distribution
          path: dist/

      - name: Publish to PyPI via Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
