name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag]"

      - name: ruff lint
        run: ruff check .

      - name: pytest
        run: pytest -v --tb=short

  hooks-shellcheck:
    name: shellcheck on hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck
        run: |
          sudo apt-get -y install shellcheck
          shellcheck hooks/pre-push hooks/pre-tool-use-guardrail.sh

  smoke:
    name: smoke (scaffold + init)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[rag]"
      - name: scaffold a brain in /tmp
        run: |
          teammate scaffold /tmp/test-brain --team-name "ci-team"
          test -f /tmp/test-brain/CLAUDE.md
      - name: init runs (Ollama not present, expected to fall back)
        run: |
          cd /tmp/test-brain
          teammate init || echo "init may exit non-zero without Ollama; that's expected on CI"
          teammate stats
